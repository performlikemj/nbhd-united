name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:
    # One-shot fleet rollout knobs. Default false on every dispatch — these
    # ops are intended to run once after PR #434 ships and then never again.
    # See `apps/orchestrator/management/commands/bump_all_tenant_images.py`
    # and `apps/orchestrator/management/commands/refresh_persona_agents_md.py`
    # for details on what each flag does.
    inputs:
      rollout_byo_image_bump:
        description: 'One-shot: bump every active tenant to current OpenClaw image'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      rollout_byo_persona_refresh:
        description: 'One-shot: re-render workspace/AGENTS.md to every active tenant'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

defaults:
  run:
    shell: bash

env:
  REGISTRY: nbhdunited
  RESOURCE_GROUP: rg-nbhd-prod
  DJANGO_APP: nbhd-django-westus2
  SWA_NAME: nbhd-united-frontend

jobs:
  # ==========================================================================
  # Frontend: lint and build
  # ==========================================================================
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend (static export)
        working-directory: frontend
        run: npm run build

  # ==========================================================================
  # Backend: Django checks and tests
  # ==========================================================================
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff
          python -m spacy download en_core_web_sm

      - name: Run ruff lint
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

      - name: Secret scan
        run: |
          HITS=$(grep -rPn '(sk-ant-|sk-or-v1-|sk-proj-|AAAAAAAAAAAAA|tvly-dev-)' \
            --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' \
            --include='*.json' --include='*.yaml' --include='*.yml' \
            --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=.venv \
            --exclude='*.lock' \
            --exclude='config_validator.py' \
            --exclude='config_security.py' \
            --exclude='test_config_security.py' \
            --exclude='harness-check' \
            --exclude='ci-cd.yml' \
            . 2>/dev/null || true)
          if [ -n "$HITS" ]; then
            echo "Secret patterns detected in source files:"
            echo "$HITS"
            exit 1
          fi
          echo "No secret patterns found"

      - name: Run Django checks and tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: test-secret-key-not-for-production
          DEBUG: "True"
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db
          ALLOWED_HOSTS: "*"
          # Force on_commit callbacks to run synchronously in tests so
          # daemon-thread USER.md pushes (envelope registry) and QStash
          # publishes (journal post_save) don't outlive the test runner
          # and hold DB connections open during teardown.
          NBHD_DISABLE_BACKGROUND_THREADS: "True"
          # Tests trigger model post_save → registry → push_user_md, which
          # would otherwise call real Azure storage. Mock keeps tests fast
          # (otherwise each save burns ~30s on DefaultAzureCredential
          # timeouts).
          AZURE_MOCK: "true"
        run: |
          python manage.py makemigrations --check --dry-run
          python manage.py migrate --noinput
          python manage.py check
          python manage.py test apps/

      - name: Config validator check
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: test-secret-key-not-for-production
          DEBUG: "True"
          DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db
          ALLOWED_HOSTS: "*"
          AZURE_MOCK: "true"
          OPENCLAW_USAGE_PLUGIN_ID: ""
        run: |
          python manage.py shell -c "
          from apps.tenants.services import create_tenant
          from apps.orchestrator.config_generator import generate_openclaw_config
          from apps.orchestrator.config_validator import validate_openclaw_config
          from apps.orchestrator.config_security import audit_config_security

          tenant = create_tenant(display_name='CI Validator', telegram_chat_id=999999)
          config = generate_openclaw_config(tenant)

          issues = validate_openclaw_config(config)
          errors = [i for i in issues if i.severity == 'error']
          if errors:
              for e in errors:
                  print(f'ERROR: {e.path} — {e.message}')
              raise SystemExit(1)

          findings = audit_config_security(config)
          sec_errors = [f for f in findings if f.severity == 'error']
          if sec_errors:
              for f in sec_errors:
                  print(f'SECURITY: {f.check} — {f.message}')
              raise SystemExit(1)

          print('Config validator: PASS')
          print('Security audit: PASS')
          "

  # ==========================================================================
  # OpenClaw config conformance smoke
  # ==========================================================================
  openclaw-config-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: smoke_db
          POSTGRES_USER: smoke_user
          POSTGRES_PASSWORD: smoke_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run OpenClaw doctor smoke
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          SECRET_KEY: test-secret-key-not-for-production
          DEBUG: "True"
          DATABASE_URL: postgres://smoke_user:smoke_password@localhost:5432/smoke_db
          ALLOWED_HOSTS: "*"
          MOONSHOT_API_KEY: "sk-smoke-test-dummy"
          NBHD_INTERNAL_API_KEY: "smoke-test-internal-key"
        run: |
          ./scripts/openclaw_config_doctor_smoke.sh

  # ==========================================================================
  # Deploy Backend (push to main only, after tests pass)
  # ==========================================================================
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test, openclaw-config-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.REGISTRY }}

      - name: Build and push Django image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.REGISTRY }}.azurecr.io/django:${{ github.sha }} \
            -t ${{ env.REGISTRY }}.azurecr.io/django:latest \
            .
          docker push ${{ env.REGISTRY }}.azurecr.io/django:${{ github.sha }}
          docker push ${{ env.REGISTRY }}.azurecr.io/django:latest

      - name: Build and push OpenClaw runtime image
        run: |
          docker build --platform linux/amd64 \
            -f Dockerfile.openclaw \
            -t ${{ env.REGISTRY }}.azurecr.io/nbhd-openclaw:${{ github.sha }} \
            -t ${{ env.REGISTRY }}.azurecr.io/nbhd-openclaw:latest \
            .
          docker push ${{ env.REGISTRY }}.azurecr.io/nbhd-openclaw:${{ github.sha }}
          docker push ${{ env.REGISTRY }}.azurecr.io/nbhd-openclaw:latest

      - name: Deploy Django to Container Apps
        run: |
          # Ensure single-revision mode (only one active revision at a time).
          # Prevents multiple Telegram pollers competing for getUpdates (409 Conflict).
          az containerapp revision set-mode \
            --name ${{ env.DJANGO_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --mode single

          az containerapp update \
            --name ${{ env.DJANGO_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}.azurecr.io/django:${{ github.sha }} \
            --set-env-vars OPENCLAW_IMAGE_TAG=${{ github.sha }}

      - name: Wait for Django to be healthy
        run: |
          DJANGO_URL="https://nbhd-django-westus2.victoriousocean-5cdd2683.westus2.azurecontainerapps.io"
          echo "Waiting for Django to come up..."
          for i in $(seq 1 24); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$DJANGO_URL/health/" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Django is up (attempt $i)"
              break
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done

      - name: Bump pending config version for all tenants
        run: |
          # Mark all active tenants as needing a config update.
          # apply-pending-configs cron will push new workspace files
          # (including docs/) to each tenant's file share on their
          # next idle cycle.
          DJANGO_URL="https://nbhd-django-westus2.victoriousocean-5cdd2683.westus2.azurecontainerapps.io"
          curl -sf -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            "$DJANGO_URL/api/cron/bump-all-pending-configs/" \
            || echo "Warning: bump-all-pending-configs failed (non-fatal)"

      - name: Reseed tenant cron jobs
        run: |
          # Delete and recreate system cron jobs for all active tenants.
          # Non-fatal: tenant containers restart asynchronously after config
          # bump — the old OpenClaw image may still be running when this fires.
          # QStash retries will reseed once containers pick up the new image.
          DJANGO_URL="https://nbhd-django-westus2.victoriousocean-5cdd2683.westus2.azurecontainerapps.io"
          curl -sf -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            "$DJANGO_URL/api/cron/force-reseed-crons/" \
            || echo "Warning: force-reseed-crons failed — containers may still be restarting"

      - name: Register system QStash cron schedules
        run: |
          # Ensure apply-pending-configs and other system crons are
          # scheduled in QStash. Idempotent — skips existing schedules.
          DJANGO_URL="https://nbhd-django-westus2.victoriousocean-5cdd2683.westus2.azurecontainerapps.io"
          curl -sf -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"base_url\": \"$DJANGO_URL\"}" \
            "$DJANGO_URL/api/cron/register-system-crons/" \
            || echo "Warning: register-system-crons failed (non-fatal)"

      - name: Backfill Fuel/Gravity welcome crons
        run: |
          # Schedule welcome crons for active tenants who enabled the
          # feature before the welcome mechanism shipped (or whose welcome
          # failed transiently on a prior deploy). The endpoint calls
          # _schedule_fuel_welcome / _schedule_finance_welcome which are
          # idempotent — they skip when a _<feature>:welcome cron is
          # already pending in the container. Re-running is safe.
          DJANGO_URL="https://nbhd-django-westus2.victoriousocean-5cdd2683.westus2.azurecontainerapps.io"
          curl -sf -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            "$DJANGO_URL/api/cron/backfill-welcomes/" \
            || echo "Warning: backfill-welcomes failed (non-fatal — manual: python manage.py backfill_welcomes)"

      - name: One-shot — fleet OpenClaw image bump (BYO rollout)
        if: github.event_name == 'workflow_dispatch' && inputs.rollout_byo_image_bump == 'true'
        run: |
          # Manual fleet rollout: bump every active tenant onto the just-
          # deployed OpenClaw image. NOT a routine deploy step — the regular
          # apply-pending-configs cron handles future bumps lazily. This
          # path exists for PR #434's one-shot BYO Anthropic rollout.
          DJANGO_URL="https://nbhd-django-westus2.victoriousocean-5cdd2683.westus2.azurecontainerapps.io"
          curl -sf -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"include_hibernated": false}' \
            "$DJANGO_URL/api/cron/rollout-byo-image-bump/"

      - name: One-shot — fleet AGENTS.md refresh (BYO rollout)
        if: github.event_name == 'workflow_dispatch' && inputs.rollout_byo_persona_refresh == 'true'
        run: |
          # Manual fleet rollout: re-render workspace/AGENTS.md from the
          # current template + per-tenant persona/extras and push to every
          # tenant's file share. Same one-shot semantics as the image bump
          # above — only fires on workflow_dispatch.
          DJANGO_URL="https://nbhd-django-westus2.victoriousocean-5cdd2683.westus2.azurecontainerapps.io"
          curl -sf -X POST \
            -H "X-Deploy-Secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"include_hibernated": false}' \
            "$DJANGO_URL/api/cron/rollout-byo-persona-refresh/"

  # ==========================================================================
  # Deploy Frontend to Azure Static Web App (push to main only)
  # ==========================================================================
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [frontend-test, backend-test, openclaw-config-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend (static export)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://nbhd-django-westus2.victoriousocean-5cdd2683.westus2.azurecontainerapps.io
        run: npm run build

      - name: Verify staticwebapp.config.json in output
        working-directory: frontend
        run: |
          if [ ! -f "out/staticwebapp.config.json" ]; then
            echo "Copying staticwebapp.config.json to out/"
            cp public/staticwebapp.config.json out/
          fi
          echo "staticwebapp.config.json present in out/"

      - name: Verify SWA deployment token
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
        run: |
          if [ -z "$SWA_CLI_DEPLOYMENT_TOKEN" ]; then
            echo "Missing SWA_DEPLOYMENT_TOKEN secret"
            exit 1
          fi

      - name: Deploy to Azure Static Web App
        working-directory: frontend
        env:
          SWA_CLI_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
        run: |
          npx --yes @azure/static-web-apps-cli@2.0.7 deploy out \
            --deployment-token "$SWA_CLI_DEPLOYMENT_TOKEN" \
            --env production \
            --verbose
